name: Post

on:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron: "0 16,20,0,4,8,12 * * *"
  push:
  pull_request:

jobs:
  post:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Cache tweetbot
        id: cache-tweetbot
        uses: actions/cache@v5
        with:
          path: dist/tweetbot-0.0.0-py3-none-any.whl
          key: ${{ github.sha }}

      - name: Post
        if: github.repository_owner == 'femiwiki' && github.ref == 'refs/heads/main' && github.event_name == 'schedule'
        run: uv run tweetbot
        env:
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          FEMIWIK_OAUTH1_CONSUMER_TOKEN: ${{ secrets.TWITTER_CONSUMER_KEY }}
          FEMIWIK_OAUTH1_CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          FEMIWIK_OAUTH1_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          FEMIWIK_OAUTH1_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
