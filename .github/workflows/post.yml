name: Post

on:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron: "0 16,20,0,4,8,12 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Post
        if: github.repository_owner == 'femiwiki' && github.ref == 'refs/heads/main'
        run: uv run tweetbot
        env:
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          FEMIWIKI_OAUTH1_CONSUMER_TOKEN: ${{ secrets.FEMIWIKI_OAUTH1_CONSUMER_TOKEN }}
          FEMIWIKI_OAUTH1_CONSUMER_SECRET: ${{ secrets.FEMIWIKI_OAUTH1_CONSUMER_SECRET }}
          FEMIWIKI_OAUTH1_ACCESS_TOKEN: ${{ secrets.FEMIWIKI_OAUTH1_ACCESS_TOKEN }}
          FEMIWIKI_OAUTH1_ACCESS_SECRET: ${{ secrets.FEMIWIKI_OAUTH1_ACCESS_SECRET }}
